    # NOTE: uncomment below to build from source
    # build:
    #   context: ./build
    # NOTE: uncomment below if you want to use GPU acceleration
    # deploy:
    # resources:
    #   reservations:
    #     devices:
    #       - driver: nvidia
    #         count: all
    #         capabilities:
    #           - gpu
    container_name: ultrasinger
    volumes:
      - ./output:/app/UltraSinger/src/output
    environment:
      - PGID=1000
      - PUID=1000
